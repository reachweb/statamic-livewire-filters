<div>
    <div aria-live="polite" wire:loading.attr="aria-busy" wire:target="loadMore">
        {{ entries }}
        <div wire:key="{{ id }}">
            {{ title }}
        </div>
        {{ /entries }}
    </div>

    {{ if infinite_scroll }}
        {{ livewire-filters:load_more }}
    {{ else }}
        <div class="mt-8 flex justify-center">
            {{ links }}
        </div>
    {{ /if }}
</div>
